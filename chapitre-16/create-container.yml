---

- name: "Create podman network"
  hosts: localhost
  gather_facts: false
  collections: &collections
    - "containers.podman"
  tasks:
    - name: "Create podman network"
      podman_network:
        name: "{{ network_name }}"
        state: present

- name: "Create Apache"
  hosts: [ "apache" ]
  gather_facts: false
  collections: *collections
  tasks:
    - name: "Create Apache containers"
      podman_container: &container
        name:         "{{ inventory_hostname }}"
        hostname:     "{{ inventory_hostname }}"
        network:      "{{ network_name }}"
        image:        "{{ container_image|d('docker.io/rockylinux/rockylinux:10-ubi-init') }}"
        state:        started
      delegate_to: localhost

- name: "Create podman platform"
  hosts: [ "all", "!apache" ]
  collections: *collections
  gather_facts: false
  tasks:
    - name: "Create containers"
      podman_container:
        <<: *container
        command:      "/sbin/init"
      delegate_to: localhost

- name: "Install prereq"
  hosts: [ "all", "!apache", "!haproxy" ]
  gather_facts: false
  tasks:
    - name: "Install prereq"
      dnf:
        name: "sudo,firewalld,iproute,procps-ng"
        state: present
