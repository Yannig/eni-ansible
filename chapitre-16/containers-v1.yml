apache:
  hosts:
    "apache[1:4]":
      container_image: "docker.io/rockylinux/rockylinux:10-ubi-init"
      start_cmd: "/sbin/init"
      php_install: true
      privileged: true

mysql:
  hosts:
    mysql1: {}

haproxy:
  hosts:
    haproxy1: {}
  vars:
    container_image: "docker.io/jrei/systemd-ubuntu:24.04"
    privileged: true

all:
  vars:
    network_name: test.eni
    ansible_connection: containers.podman.podman
    ansible_become_method: ansible.builtin.runas
