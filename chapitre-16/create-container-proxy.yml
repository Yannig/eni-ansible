---

- name: "Create Proxy"
  hosts: [ "localhost" ]
  gather_facts: false
  collections:
    - "containers.podman"
  tasks:
    - name: "Launch proxy"
      podman_container:
        name:     "proxy"
        ports:    "3128:3128"
        network:  "{{ network_name }}"
        image:    "docker.io/mpreu/squid:7.5"
        state:    started
        volumes:
          - ./squid/squid.conf:/etc/squid/squid.conf:ro
