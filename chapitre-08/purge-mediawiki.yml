---

- name: "MediaWiki db configuration"
  hosts: mysql
  gather_facts: false
  tags: [ "mariadb", "mysql" ]
  tasks:
    - name: "mediawiki database"
      mysql_db:
        name: "mediawiki"
        state: absent

    - name: "mediawiki user+privileges"
      mysql_user:
        name:     "mediawiki"
        host:     "{{ item }}"
        state:    absent
      loop: "{{ groups.apache }}"


- name: "MediaWiki apache configuration"
  hosts: apache
  tags: "apache"
  gather_facts: false
  tasks:
    - ansible.builtin.file:
        path: "/var/www/html/mediawiki"
        state: absent
