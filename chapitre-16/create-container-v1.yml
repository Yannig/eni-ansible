---

- name: "Create podman network"
  hosts: localhost
  gather_facts: false
  collections: &collections
    - "containers.podman"
  tasks:
    - name: "Create podman network"
      podman_network:
        name: "{{ network_name }}"
        state: present

- name: "Create podman platform"
  hosts: [ "all" ]
  gather_facts: false
  collections: *collections
  tasks:
    - name: "Create containers"
      podman_container:
        name:      "{{ inventory_hostname }}"
        hostname:  "{{ inventory_hostname }}"
        command:   "/sbin/init"
        network:   "{{ network_name }}"
        image:     "{{ container_image|d('docker.io/rockylinux/rockylinux:10-ubi-init') }}"
        privileged: true
        state:     started
      delegate_to: localhost

- name: "Install prereq"
  hosts: [ "apache", "mysql" ]
  gather_facts: false
  tasks:
    - name: "Install prereq"
      dnf:
        name: "firewalld,iproute"
        state: present
